name: bundle

on:
  push:
    branches:
      - master
      - main
      - nightly
    paths-ignore:
      - dist/**
  workflow_dispatch:

permissions:
  actions: read
  contents: write

concurrency:
  group: ${{ github.workflow }}

jobs:
  bundle:
    if: github.repository != 'StageDog/tavern_helper_template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: JesseTG/rm@v1.0.3
        with:
          path: dist

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - run: pnpm install && pnpm build
      - name: Rename 骰子系统 files based on branch
        run: |
          if [ "${{ github.ref_name }}" = "nightly" ]; then
            if [ -f "dist/骰子系统/index.js" ]; then
              mv "dist/骰子系统/index.js" "dist/骰子系统/nightly.js"
            fi
            if [ -f "dist/骰子系统/index.js.map" ]; then
              mv "dist/骰子系统/index.js.map" "dist/骰子系统/nightly.js.map"
            fi
          elif [ "${{ github.ref_name }}" = "main" ] || [ "${{ github.ref_name }}" = "master" ]; then
            if [ -f "dist/骰子系统/index.js" ]; then
              mv "dist/骰子系统/index.js" "dist/骰子系统/main.js"
            fi
            if [ -f "dist/骰子系统/index.js.map" ]; then
              mv "dist/骰子系统/index.js.map" "dist/骰子系统/main.js.map"
            fi
          fi
      - name: Commit changes
        uses: EndBug/add-and-commit@v9.1.3
        with:
          default_author: github_actions
          message: '[bot] bundle'
